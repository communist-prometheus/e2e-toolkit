name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      # @types/node: src/wait-for.ts imports node:process (env wait ceiling).
      - run: bun install --no-save typescript @playwright/test @types/node
      - name: Type-check
        run: bunx tsc --noEmit
